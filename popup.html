<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Diário de Erros Fiscais</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

<div id="app">

  <!-- ── Header ─────────────────────────────────────── -->
  <header>
    <div id="header-left">
      <span id="logo">
        <img src="icon.png" alt="Logo" width="50" height="50" />
      </span>
      <div>
        <div id="app-title">Diário de Erros</div>
        <div id="app-sub">IXC Provedor · Suporte Fiscal</div>
      </div>
    </div>
    <button id="btn-novo" title="Cadastrar novo erro">+ Novo</button>
  </header>

  <!-- ── Search ─────────────────────────────────────── -->
  <div id="search-wrap">
    <input id="search" type="text" placeholder="Buscar por código, descrição ou tipo..." autocomplete="off" />
  </div>

  <!-- ── Views ──────────────────────────────────────── -->

  <!-- LIST VIEW -->
  <div id="view-list">
    <div id="filter-bar"></div>
    <div id="subfilter-bar" style="display:none"></div>
    <div id="error-list"></div>
    <div id="empty-state" style="display:none">
      <span>🔍</span>
      <p>Nenhum erro encontrado.</p>
      <small>Tente outro termo ou cadastre um novo.</small>
    </div>
  </div>

  <!-- DETAIL VIEW -->
  <div id="view-detail" style="display:none">
    <button id="btn-back">← Voltar</button>
    <div id="detail-content"></div>
    <div id="detail-actions">
      <button id="btn-edit">Editar</button>
      <button id="btn-delete">Excluir</button>
    </div>
  </div>

  <!-- FORM VIEW -->
  <div id="view-form" style="display:none">
    <div id="form-title">Cadastrar erro</div>

    <label>Código / mensagem de erro *</label>
    <input id="f-codigo" type="text" placeholder="Ex: Rejeição 999" />

    <label>Categoria *</label>
    <select id="f-categoria"></select>

    <label id="label-subcategoria" style="display:none">Subcategoria</label>
    <select id="f-subcategoria" style="display:none"></select>

    <label>Causa do erro *</label>
    <textarea id="f-causa" rows="2" placeholder="Por que este erro acontece?"></textarea>

    <label>Resolução no IXC *</label>
    <textarea id="f-resolucao" rows="4" placeholder="Passo a passo para resolver dentro do IXC Provedor..."></textarea>

    <label>O que perguntar ao cliente (opcional)</label>
    <textarea id="f-perguntar" rows="2" placeholder="Informações a solicitar se o erro persistir..."></textarea>

    <label>Registrado por</label>
    <input id="f-autor" type="text" placeholder="Seu nome" />

    <div id="form-error"></div>

    <div id="form-actions">
      <button id="btn-cancelar">Cancelar</button>
      <button id="btn-salvar">Salvar erro</button>
    </div>
  </div>

</div>

<script src="popup.js"></script>
</body>
</html>
